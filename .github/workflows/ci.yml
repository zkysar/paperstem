name: CI + Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  check:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      GMAIL_USER: ci@example.com
      GMAIL_APP_PASSWORD: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vitest run

  e2e:
    name: E2E (Playwright)
    needs: check
    runs-on: ubuntu-latest
    env:
      GMAIL_USER: ci@example.com
      GMAIL_APP_PASSWORD: placeholder
      # Disable hint banners and zoom toast that could obscure clicks in
      # the journeys.
      PAPERSTEM_E2E: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Pin the Playwright browser version to the installed package so the
      # cache key invalidates when @playwright/test bumps. The version is
      # read from package-lock.json; if you bump @playwright/test, the
      # next CI run downloads the matching Chromium and re-populates the
      # cache automatically.
      - name: Resolve Playwright version
        id: pw
        run: |
          v=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cached browser path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy-dev:
    name: Deploy to paperstem-dev
    needs: [check, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          flyctl deploy \
            --config fly.dev.toml \
            --remote-only \
            --build-arg APP_VERSION="dev-${SHORT_SHA}" \
            --build-arg VITE_POSTHOG_KEY="${{ secrets.POSTHOG_PROJECT_TOKEN }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-prod:
    name: Deploy to paperstem (prod)
    needs: [check, e2e]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl deploy \
            --config fly.toml \
            --remote-only \
            --build-arg APP_VERSION="${{ github.ref_name }}" \
            --build-arg VITE_POSTHOG_KEY="${{ secrets.POSTHOG_PROJECT_TOKEN }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
