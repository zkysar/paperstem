app = "paperstem"
primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATABASE_PATH = "/data/paperstem.sqlite"
  PAPERSTEM_AUDIO_ROOT = "/data/audio"
  APP_URL = "https://paperstem.fly.dev"
  APP_ENV = "prod"

[[mounts]]
  source = "paperstem_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
