<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Paperstem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap">
<script src="https://unpkg.com/wavesurfer.js@7"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="lib.js"></script>
<!--
  How to run
  ----------
    Serve over HTTP (browsers block fetch from file://):

        cd /Users/zachkysar/projects/paperstem
        python3 -m http.server
        # then open http://localhost:8000

    The page reads practices.json at startup, populates the sidebar,
    and auto-loads the first practice. Adding a new practice = drop a
    folder + add an entry. The "Load local folder…" link in the
    sidebar footer still works as a fallback for arbitrary local
    folders (works from file:// too).

  Layout
  ------
    Two columns: sidebar with the practice list, and a DAW-style
    multitrack player. One shared timeline ruler at the top, one
    playhead spanning every track row. Clip widths are
    (stemDuration / songDuration) * 100%, so shorter stems visibly
    end before the right edge.

  Loop region
  -----------
    Drag on the ruler to paint a loop region. Drag the handles to
    resize, drag inside to move. Click outside to clear, or press
    Esc. Press L to toggle looping without losing the region.
-->
<style>
  :root {
    --bg: #fbf9f4;
    --ink: #2a2723;
    --ink-2: #5a5247;
    --muted: #8a7e6b;
    --muted-2: #a89a83;
    --rule: #ece6d8;
    --rule-2: #f1ebdd;
    --paper: #fff;
    --accent: #c17446;
    --accent-tint: rgba(193, 116, 70, 0.08);
    --accent-tint-2: rgba(193, 116, 70, 0.18);
    --accent-tint-3: rgba(193, 116, 70, 0.04);
    --rail-w: 200px;
    --rail-gap: 14px;
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  button { font: inherit; cursor: pointer; }
  kbd {
    font-family: ui-monospace, SFMono-Regular, monospace;
    padding: 1px 5px;
    background: var(--paper);
    border: 1px solid #d8cfbb;
    border-radius: 3px;
    font-size: 0.68rem;
  }

  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 28px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px;
  }

  /* ===== Sidebar ===== */
  .sidebar { padding-top: 4px; }
  .brand {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .brand-tag {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .practice-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .practice-item {
    padding: 8px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--ink-2);
    display: flex;
    flex-direction: column;
    gap: 2px;
    user-select: none;
  }
  .practice-item:hover { background: var(--accent-tint); }
  .practice-item.active { background: var(--ink); color: var(--bg); }
  .practice-item .practice-meta {
    font-size: 0.65rem;
    opacity: 0.7;
    font-family: ui-monospace, SFMono-Regular, monospace;
  }
  .sidebar-footer {
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid var(--rule);
  }
  .sidebar-footer button {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.72rem;
    padding: 4px 0;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 3px;
  }
  .sidebar-footer button:hover { color: var(--ink); }

  /* ===== Player ===== */
  .player { min-width: 0; }
  .player-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .player-meta {
    font-size: 0.66rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .player-title {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-top: 6px;
  }

  .transport {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 0;
  }
  .tbtn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--paper);
    border: 1px solid #d8cfbb;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    color: var(--ink);
    padding: 0;
  }
  .tbtn:disabled { opacity: 0.4; cursor: default; }
  .tbtn.play { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .tbtn.loop.on { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .tbtn:hover:not(:disabled) { transform: translateY(-1px); transition: transform 0.1s; }
  .ttime {
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* ===== Stage (ruler + tracks + overlays) ===== */
  .stage { position: relative; }

  .ruler-row, .track {
    display: grid;
    grid-template-columns: var(--rail-w) 1fr;
    gap: var(--rail-gap);
    align-items: center;
  }

  .ruler-spacer { /* empty col-1 above tracks */ }
  .ruler {
    height: 22px;
    position: relative;
    border-bottom: 1px solid var(--rule);
    cursor: crosshair;
    user-select: none;
  }
  .ruler-label {
    position: absolute;
    top: 4px;
    font-size: 0.62rem;
    color: var(--muted-2);
    font-family: ui-monospace, SFMono-Regular, monospace;
    pointer-events: none;
  }
  .ruler-tick {
    position: absolute;
    top: 14px;
    bottom: 0;
    width: 1px;
    background: var(--rule);
    pointer-events: none;
  }

  .tracks { padding-top: 4px; }
  .empty {
    color: var(--muted);
    padding: 32px 0;
    text-align: center;
    font-size: 0.85rem;
  }

  .track {
    height: 44px;
    border-bottom: 1px solid var(--rule-2);
  }
  .track:last-child { border-bottom: none; }
  .track.focused .track-rail { background: var(--accent-tint-3); border-radius: 4px; }

  .track-rail {
    display: grid;
    grid-template-columns: 6px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 4px 6px 4px 4px;
    min-width: 0;
  }
  .swatch { width: 6px; height: 24px; border-radius: 2px; }
  .track-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .track-name {
    font-size: 0.82rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .vol-row { display: flex; align-items: center; gap: 6px; }
  .vol-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #e5dfd0;
    border-radius: 2px;
    outline: none;
    min-width: 50px;
    margin: 0;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
    border: none;
  }
  .vol-slider::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
    border: none;
  }
  .vol-num {
    font-size: 0.62rem;
    color: var(--muted-2);
    font-family: ui-monospace, SFMono-Regular, monospace;
    min-width: 22px;
    text-align: right;
  }
  .ms-pills { display: flex; gap: 3px; }
  .pill {
    font-size: 0.58rem;
    padding: 3px 6px;
    border-radius: 8px;
    background: var(--paper);
    border: 1px solid #d8cfbb;
    color: var(--muted);
    font-weight: 700;
    line-height: 1;
  }
  .pill.mute.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .pill.solo.on { background: var(--accent); color: var(--paper); border-color: var(--accent); }

  .wave {
    position: relative;
    height: 36px;
    min-width: 0;
  }
  .clip {
    position: absolute;
    top: 4px; bottom: 4px;
    left: 0;
    background: var(--accent-tint-3);
    border-radius: 3px;
    border: 1px solid var(--accent-tint-2);
    overflow: hidden;
    /* width set inline based on stem/song duration */
  }
  .clip.muted { opacity: 0.3; }

  /* ===== Overlays (playhead, loop region) ===== */
  .loop-region {
    position: absolute;
    top: 0; bottom: 0;
    background: var(--accent-tint);
    border-left: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
    pointer-events: auto;
    cursor: move;
    box-sizing: border-box;
  }
  .loop-region[hidden] { display: none; }
  .loop-region.disabled {
    background: rgba(193, 116, 70, 0.04);
    border-color: rgba(193, 116, 70, 0.4);
  }
  .loop-handle {
    position: absolute;
    top: 4px;
    width: 10px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
    cursor: ew-resize;
  }
  .loop-handle.left { left: -6px; }
  .loop-handle.right { right: -6px; }

  .playhead {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--accent);
    pointer-events: none;
    z-index: 5;
  }
  .playhead[hidden] { display: none; }

  /* ===== Footer bits ===== */
  .status {
    color: var(--muted);
    font-size: 0.78rem;
    margin: 12px 0 0;
    min-height: 1em;
  }
  .keys-hint {
    margin-top: 16px;
    padding: 10px 12px;
    background: var(--accent-tint-3);
    border-radius: 5px;
    font-size: 0.72rem;
    color: #6b5a45;
    line-height: 1.6;
  }

  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="brand">Paperstem</h1>
      <div class="brand-tag">Practices</div>
      <ul class="practice-list" id="practiceList">
        <li class="empty" style="font-size:0.78rem">Loading…</li>
      </ul>
      <div class="sidebar-footer">
        <input type="file" id="folder" webkitdirectory directory multiple hidden>
        <button id="loadFolderBtn">Load local folder…</button>
      </div>
    </aside>

    <main class="player">
      <div class="player-header">
        <div>
          <div class="player-meta">Practice</div>
          <div class="player-title" id="title">—</div>
        </div>
        <div class="player-meta" id="meta"></div>
      </div>

      <div class="transport">
        <button class="tbtn" id="restartBtn" title="Restart" disabled>⏮</button>
        <button class="tbtn play" id="playBtn" title="Play / Pause (Space)" disabled>▶</button>
        <button class="tbtn loop" id="loopBtn" title="Toggle loop (L)" disabled>⟲</button>
        <button class="tbtn" id="downloadBtn" title="Download all stems" disabled>⤓</button>
        <span class="ttime" id="time">0:00 / 0:00</span>
      </div>

      <div class="stage" id="stage">
        <div class="ruler-row">
          <div class="ruler-spacer"></div>
          <div class="ruler" id="ruler"></div>
        </div>
        <div class="tracks" id="stems">
          <div class="empty">No practice loaded.</div>
        </div>
        <div class="loop-region" id="loopRegion" hidden>
          <div class="loop-handle left" data-handle="left"></div>
          <div class="loop-handle right" data-handle="right"></div>
        </div>
        <div class="playhead" id="playhead" hidden></div>
      </div>

      <div class="status" id="status"></div>

      <div class="keys-hint">
        <strong>Keys:</strong>
        <kbd>Space</kbd> play/pause &middot;
        <kbd>L</kbd> loop on/off &middot;
        <kbd>Esc</kbd> clear loop &middot;
        <kbd>M</kbd>/<kbd>S</kbd> mute/solo focused track &middot;
        drag the ruler to set a loop region
      </div>
    </main>
  </div>

<script>
const AUDIO_EXT = /\.(mp3|wav|ogg|oga|flac|m4a|aac|webm|opus)$/i;
const DRIFT_THRESHOLD = 0.05;
const DRAG_THRESHOLD_PX = 4;
const MIN_LOOP_SEC = 0.05;

// Stem palette — assigned by index, wraps if more stems than colors.
const PALETTE = [
  '#c17446', '#8a6a3f', '#5e7a4e', '#3b6675',
  '#7d4e6b', '#a87a3f', '#594b76', '#9f4a4a',
];

// fmt, mix, stripCommonPrefix, longestStemIdx come from lib.js (loaded above
// as a classic script — its function declarations are visible here by name).

// State -----------------------------------------------------------
const stems = [];
let practices = [];
let activePracticeId = null;
let duration = 0;
let referenceIdx = 0;
let isPlaying = false;
let driftTimer = null;
let focusedIdx = -1;

let loopStart = null;
let loopEnd = null;
let loopEnabled = false;

let drag = null;
let waveLeft = 0;
let waveWidth = 0;

// Elements --------------------------------------------------------
const $ = id => document.getElementById(id);
const titleEl     = $('title');
const metaEl      = $('meta');
const playBtn     = $('playBtn');
const restartBtn  = $('restartBtn');
const loopBtn     = $('loopBtn');
const downloadBtn = $('downloadBtn');
const timeEl      = $('time');
const stageEl     = $('stage');
const rulerEl     = $('ruler');
const stemsEl     = $('stems');
const statusEl    = $('status');
const loopRegionEl= $('loopRegion');
const playheadEl  = $('playhead');
const folderInput = $('folder');
const loadFolderBtn = $('loadFolderBtn');
const practiceListEl= $('practiceList');

// ----- Boot -----
init();
async function init() {
  setupEvents();
  try {
    const res = await fetch('./practices.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    practices = data.practices || [];
  } catch (err) {
    practices = [];
    statusEl.textContent =
      `Could not load practices.json (${err.message}). ` +
      (location.protocol === 'file:' ?
        'Run `python3 -m http.server` and open http://localhost:8000.' :
        'Use “Load local folder…” to load stems manually.');
  }
  renderPracticeList();
  if (practices.length) selectPractice(practices[0].id);
}

function setupEvents() {
  playBtn.addEventListener('click', togglePlay);
  restartBtn.addEventListener('click', () => { seekTo(0); });
  loopBtn.addEventListener('click', toggleLoopEnabled);
  downloadBtn.addEventListener('click', downloadAllStems);
  loadFolderBtn.addEventListener('click', () => folderInput.click());
  folderInput.addEventListener('change', onFolderPicked);

  rulerEl.addEventListener('mousedown', onRulerMouseDown);
  loopRegionEl.addEventListener('mousedown', onLoopRegionMouseDown);

  document.addEventListener('keydown', onKeyDown);
  window.addEventListener('resize', () => { measureWaveArea(); positionOverlays(); });

  requestAnimationFrame(uiTick);
}

// ----- Practice list -----
function renderPracticeList() {
  practiceListEl.innerHTML = '';
  if (!practices.length) {
    const li = document.createElement('li');
    li.className = 'empty';
    li.style.fontSize = '0.78rem';
    li.textContent = 'No practices yet.';
    practiceListEl.appendChild(li);
    return;
  }
  for (const p of practices) {
    const li = document.createElement('li');
    li.className = 'practice-item' + (p.id === activePracticeId ? ' active' : '');
    li.dataset.id = p.id;
    li.innerHTML = `
      <span class="practice-title"></span>
      <span class="practice-meta"></span>
    `;
    li.querySelector('.practice-title').textContent = p.title;
    li.querySelector('.practice-meta').textContent =
      `${p.folder.replace(/\/$/, '')} · ${p.stems.length} stems`;
    li.addEventListener('click', () => selectPractice(p.id));
    practiceListEl.appendChild(li);
  }
}

function selectPractice(id) {
  const p = practices.find(x => x.id === id);
  if (!p) return;
  activePracticeId = id;
  renderPracticeList();
  const items = p.stems.map(name => ({
    name,
    src: p.folder + encodeURIComponent(name),
  }));
  loadStems(items, { practiceId: p.id, title: p.title });
}

// ----- Folder picker fallback -----
function onFolderPicked(e) {
  const files = [...e.target.files].filter(f => AUDIO_EXT.test(f.name));
  if (!files.length) {
    teardownStems();
    statusEl.textContent = 'No audio files in that folder.';
    return;
  }
  files.sort((a, b) => a.name.localeCompare(b.name));
  // Derive a folder name as the title (first path segment of relative path).
  const rel = files[0].webkitRelativePath || files[0].name;
  const folderName = rel.split('/')[0] || 'Local folder';
  const items = files.map(f => {
    const url = URL.createObjectURL(f);
    return { name: f.name, src: url, revoke: () => URL.revokeObjectURL(url) };
  });
  activePracticeId = null;
  renderPracticeList();
  loadStems(items, { practiceId: 'local:' + folderName, title: folderName });
}

// ----- Stem loading -----
function teardownStems() {
  for (const s of stems) {
    s.audio.pause();
    if (s.wavesurfer) { try { s.wavesurfer.destroy(); } catch {} }
    if (s.revoke) s.revoke();
  }
  stems.length = 0;
  stemsEl.innerHTML = '';
  isPlaying = false;
  duration = 0;
  referenceIdx = 0;
  focusedIdx = -1;
  playBtn.textContent = '▶';
  playBtn.disabled = restartBtn.disabled = loopBtn.disabled = downloadBtn.disabled = true;
  loopStart = loopEnd = null;
  loopEnabled = false;
  loopRegionEl.hidden = true;
  playheadEl.hidden = true;
  loopBtn.classList.remove('on');
  updateTimeDisplay(0);
  stopDriftLoop();
}

async function loadStems(items, ctx) {
  teardownStems();
  if (!items.length) return;
  titleEl.textContent = ctx.title;
  metaEl.textContent = `${items.length} stem${items.length === 1 ? '' : 's'}`;
  statusEl.textContent = `Loading ${items.length} stem${items.length > 1 ? 's' : ''}…`;

  const displayNames = stripCommonPrefix(items.map(it => it.name));

  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    const audio = new Audio();
    audio.preload = 'auto';
    audio.src = it.src;
    const stem = {
      name: it.name,
      displayName: displayNames[i],
      color: PALETTE[i % PALETTE.length],
      audio,
      userMuted: false,
      soloed: false,
      userVolume: loadVolume(ctx.practiceId, it.name),
      wavesurfer: null,
      revoke: it.revoke,
      practiceId: ctx.practiceId,
      // DOM refs filled by renderStem
      row: null, clipEl: null, muteBtn: null, soloBtn: null, volSlider: null, volNum: null,
    };
    stems.push(stem);
    audio.volume = stem.userVolume / 100;
    renderStem(stem, stems.length - 1);
    attachWaveform(stem, it.src);
  }

  // Wait for metadata so we know each duration.
  const errored = [];
  await Promise.all(stems.map(s => new Promise(res => {
    if (s.audio.readyState >= 1) return res();
    s.audio.addEventListener('loadedmetadata', () => res(), { once: true });
    s.audio.addEventListener('error', () => { errored.push(s.name); res(); }, { once: true });
  })));

  duration = stems.reduce(
    (m, s) => Math.max(m, isFinite(s.audio.duration) ? s.audio.duration : 0),
    0
  );
  referenceIdx = longestStemIdx(stems.map(s => s.audio.duration));
  metaEl.textContent = `${stems.length} stems · ${fmt(duration)}`;
  renderRuler(duration);
  resizeClips();
  measureWaveArea();
  positionOverlays();
  applyMixState();

  if (duration) {
    playBtn.disabled = restartBtn.disabled = downloadBtn.disabled = false;
    // Loop button stays disabled until the user paints a region.
    loopBtn.disabled = true;
    playheadEl.hidden = false;
    updatePlayhead(0);
    updateTimeDisplay(0);
  }

  const okCount = stems.length - errored.length;
  let msg = `${okCount} stem${okCount === 1 ? '' : 's'} loaded · ${fmt(duration)}`;
  if (errored.length) msg += ` · failed: ${errored.join(', ')}`;
  statusEl.textContent = msg;
}

function renderStem(stem, idx) {
  const row = document.createElement('div');
  row.className = 'track';
  row.dataset.idx = idx;
  row.innerHTML = `
    <div class="track-rail">
      <span class="swatch"></span>
      <div class="track-info">
        <span class="track-name"></span>
        <span class="vol-row">
          <input class="vol-slider" type="range" min="0" max="100" step="1">
          <span class="vol-num"></span>
        </span>
      </div>
      <span class="ms-pills">
        <button class="pill mute" type="button">M</button>
        <button class="pill solo" type="button">S</button>
      </span>
    </div>
    <div class="wave"><div class="clip"></div></div>
  `;
  stemsEl.appendChild(row);

  stem.row       = row;
  stem.clipEl    = row.querySelector('.clip');
  stem.muteBtn   = row.querySelector('.pill.mute');
  stem.soloBtn   = row.querySelector('.pill.solo');
  stem.volSlider = row.querySelector('.vol-slider');
  stem.volNum    = row.querySelector('.vol-num');

  row.querySelector('.swatch').style.background = stem.color;
  row.querySelector('.track-name').textContent = stem.displayName;
  row.querySelector('.track-name').title = stem.displayName;
  stem.volSlider.value = stem.userVolume;
  stem.volNum.textContent = stem.userVolume;

  stem.muteBtn.addEventListener('click', () => {
    stem.userMuted = !stem.userMuted;
    applyMixState();
  });
  stem.soloBtn.addEventListener('click', () => {
    stem.soloed = !stem.soloed;
    applyMixState();
  });
  stem.volSlider.addEventListener('input', () => {
    const v = parseInt(stem.volSlider.value, 10);
    stem.userVolume = v;
    stem.volNum.textContent = v;
    stem.audio.volume = v / 100;
    saveVolume(stem.practiceId, stem.name, v);
  });
  row.addEventListener('mousedown', e => {
    if (e.target.closest('.pill, .vol-slider, .clip')) return;
    focusStem(idx);
  });
}

function attachWaveform(stem, src) {
  if (typeof WaveSurfer !== 'function') return;
  let ws;
  const dark = mix(stem.color, '#2a2723', 0.35);
  try {
    ws = WaveSurfer.create({
      container: stem.clipEl,
      media: stem.audio,
      url: src,
      height: 28,
      waveColor: stem.color,
      progressColor: dark,
      cursorColor: 'transparent',
      cursorWidth: 0,
      barWidth: 2,
      barGap: 1,
      barRadius: 0,
      normalize: true,
      interact: true,
    });
  } catch (e) {
    return;
  }
  stem.wavesurfer = ws;
  ws.on('interaction', t => seekTo(t));
  ws.on('error', () => {});
  // Recompute clip widths once a stem's waveform is decoded — duration may
  // refine after this point.
  ws.on('ready', () => { resizeClips(); measureWaveArea(); positionOverlays(); });
}

// ----- Mix state (mute/solo/volume) -----
function applyMixState() {
  const anySolo = stems.some(s => s.soloed);
  for (const s of stems) {
    const muted = anySolo ? !s.soloed : s.userMuted;
    s.audio.muted = muted;
    s.muteBtn.classList.toggle('on', s.userMuted);
    s.soloBtn.classList.toggle('on', s.soloed);
    s.clipEl.classList.toggle('muted', muted);
  }
}

function focusStem(idx) {
  focusedIdx = idx;
  for (let i = 0; i < stems.length; i++) {
    stems[i].row.classList.toggle('focused', i === idx);
  }
}

function loadVolume(practiceId, stemName) {
  if (!practiceId) return 80;
  try {
    const v = localStorage.getItem(`vol:${practiceId}:${stemName}`);
    return v == null ? 80 : Math.max(0, Math.min(100, parseInt(v, 10)));
  } catch { return 80; }
}
function saveVolume(practiceId, stemName, v) {
  if (!practiceId) return;
  try { localStorage.setItem(`vol:${practiceId}:${stemName}`, String(v)); } catch {}
}

// ----- Ruler & clips -----
function renderRuler(dur) {
  rulerEl.innerHTML = '';
  if (!dur) return;
  const pcts = [0, 0.25, 0.5, 0.75, 1];
  for (const p of pcts) {
    const label = document.createElement('span');
    label.className = 'ruler-label';
    if (p === 0) label.style.left = '0';
    else if (p === 1) label.style.right = '0';
    else label.style.left = (p * 100) + '%';
    label.textContent = fmt(dur * p);
    rulerEl.appendChild(label);
    if (p > 0 && p < 1) {
      const tick = document.createElement('span');
      tick.className = 'ruler-tick';
      tick.style.left = (p * 100) + '%';
      rulerEl.appendChild(tick);
    }
  }
}

function resizeClips() {
  if (!duration) return;
  for (const s of stems) {
    const d = isFinite(s.audio.duration) ? s.audio.duration : duration;
    const pct = Math.max(0.01, Math.min(1, d / duration));
    s.clipEl.style.width = (pct * 100) + '%';
  }
}

function measureWaveArea() {
  const firstWave = stemsEl.querySelector('.wave');
  if (!firstWave) {
    waveLeft = 0; waveWidth = 0;
    return;
  }
  const stageRect = stageEl.getBoundingClientRect();
  const waveRect  = firstWave.getBoundingClientRect();
  waveLeft  = waveRect.left - stageRect.left;
  waveWidth = waveRect.width;
}

function positionOverlays() {
  if (!duration) return;
  // Loop region
  if (loopStart != null && loopEnd != null) {
    const x = waveLeft + (loopStart / duration) * waveWidth;
    const w = ((loopEnd - loopStart) / duration) * waveWidth;
    loopRegionEl.style.left  = x + 'px';
    loopRegionEl.style.width = w + 'px';
    loopRegionEl.hidden = false;
    loopRegionEl.classList.toggle('disabled', !loopEnabled);
  } else {
    loopRegionEl.hidden = true;
  }
  // Playhead
  const t = stems.length ? stems[referenceIdx].audio.currentTime : 0;
  updatePlayhead(t);
}

function updatePlayhead(t) {
  if (!duration || !stems.length) return;
  const x = waveLeft + (Math.min(t, duration) / duration) * waveWidth;
  playheadEl.style.left = x + 'px';
}

// Convert a clientX on the ruler/stage to a song time.
function xToTime(clientX) {
  if (!duration || !waveWidth) return 0;
  const stageRect = stageEl.getBoundingClientRect();
  const localX = clientX - stageRect.left - waveLeft;
  return Math.max(0, Math.min(duration, (localX / waveWidth) * duration));
}

// ----- Ruler interactions (click to seek, drag to set loop) -----
function onRulerMouseDown(e) {
  if (!duration) return;
  if (e.button !== 0) return;
  const startTime = xToTime(e.clientX);
  drag = {
    mode: 'create',
    originX: e.clientX,
    originTime: startTime,
    didMove: false,
  };
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  e.preventDefault();
}

function onLoopRegionMouseDown(e) {
  if (!duration) return;
  if (e.button !== 0) return;
  const handle = e.target.closest('.loop-handle');
  if (handle) {
    drag = {
      mode: handle.dataset.handle === 'left' ? 'resize-left' : 'resize-right',
      originX: e.clientX,
      originStart: loopStart,
      originEnd: loopEnd,
      didMove: false,
    };
  } else {
    drag = {
      mode: 'move',
      originX: e.clientX,
      originStart: loopStart,
      originEnd: loopEnd,
      didMove: false,
    };
  }
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  e.stopPropagation();
  e.preventDefault();
}

function onDragMove(e) {
  if (!drag) return;
  const dx = e.clientX - drag.originX;
  if (Math.abs(dx) > DRAG_THRESHOLD_PX) drag.didMove = true;
  const t = xToTime(e.clientX);

  if (drag.mode === 'create') {
    if (!drag.didMove) return;
    loopStart = Math.min(drag.originTime, t);
    loopEnd   = Math.max(drag.originTime, t);
  } else if (drag.mode === 'move') {
    const ddt = (dx / waveWidth) * duration;
    let ns = drag.originStart + ddt;
    let ne = drag.originEnd + ddt;
    const w = ne - ns;
    if (ns < 0) { ns = 0; ne = w; }
    if (ne > duration) { ne = duration; ns = duration - w; }
    loopStart = ns; loopEnd = ne;
  } else if (drag.mode === 'resize-left') {
    loopStart = Math.max(0, Math.min(t, drag.originEnd - MIN_LOOP_SEC));
  } else if (drag.mode === 'resize-right') {
    loopEnd = Math.min(duration, Math.max(t, drag.originStart + MIN_LOOP_SEC));
  }
  positionOverlays();
}

function onDragEnd(e) {
  if (!drag) return;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);

  if (!drag.didMove) {
    // It was a click, not a drag.
    const t = xToTime(e.clientX);
    if (drag.mode === 'create') {
      // Click on the ruler — clear region (if any) OR seek (if none).
      if (loopStart != null) {
        clearLoop();
      } else {
        seekTo(t);
      }
    } else {
      // Click inside the region or on a handle without dragging — seek.
      seekTo(t);
    }
  } else if (drag.mode === 'create') {
    // Auto-enable loop when a fresh region is created.
    if (loopEnd - loopStart >= MIN_LOOP_SEC) {
      loopEnabled = true;
      loopBtn.disabled = false;
      updateLoopButton();
      positionOverlays();
    } else {
      // Too tiny — discard.
      clearLoop();
    }
  }
  drag = null;
}

function clearLoop() {
  loopStart = loopEnd = null;
  loopEnabled = false;
  loopRegionEl.hidden = true;
  loopBtn.disabled = true;
  updateLoopButton();
}

function toggleLoopEnabled() {
  if (loopStart == null) return;
  loopEnabled = !loopEnabled;
  updateLoopButton();
  positionOverlays();
}
function updateLoopButton() {
  loopBtn.classList.toggle('on', loopEnabled);
}

// ----- Transport -----
function seekTo(t) {
  t = Math.max(0, Math.min(duration, t));
  for (const s of stems) {
    try { s.audio.currentTime = t; } catch {}
  }
  updatePlayhead(t);
  updateTimeDisplay(t);
}

async function togglePlay() {
  if (!stems.length) return;
  if (isPlaying) {
    for (const s of stems) s.audio.pause();
    isPlaying = false;
    playBtn.textContent = '▶';
    stopDriftLoop();
    return;
  }
  // Align all stems to the reference stem's playhead before starting.
  const t = stems[referenceIdx].audio.currentTime;
  for (const s of stems) {
    try { s.audio.currentTime = t; } catch {}
  }
  const results = await Promise.all(
    stems.map(s => s.audio.play().then(() => true).catch(err => err))
  );
  const failed = results.filter(r => r !== true);
  if (failed.length === stems.length) {
    statusEl.textContent = 'Playback blocked — click the page once and try again.';
    return;
  }
  isPlaying = true;
  playBtn.textContent = '⏸';
  startDriftLoop();
}

// ----- Frame loop -----
function uiTick() {
  if (isPlaying && stems.length) {
    const t = stems[referenceIdx].audio.currentTime;
    updatePlayhead(t);
    updateTimeDisplay(t);

    // Loop wrap.
    if (loopEnabled && loopStart != null && t >= loopEnd - 0.005) {
      seekTo(loopStart);
    }
    // End-of-song reset.
    else if (duration && t >= duration - 0.02) {
      for (const s of stems) s.audio.pause();
      isPlaying = false;
      playBtn.textContent = '▶';
      stopDriftLoop();
      seekTo(0);
    }
  }
  requestAnimationFrame(uiTick);
}

function updateTimeDisplay(t) {
  timeEl.textContent = `${fmt(t)} / ${fmt(duration)}`;
}

function startDriftLoop() {
  stopDriftLoop();
  driftTimer = setInterval(() => {
    if (!isPlaying || stems.length < 2) return;
    const ref = stems[referenceIdx].audio.currentTime;
    for (let i = 0; i < stems.length; i++) {
      if (i === referenceIdx) continue;
      const a = stems[i].audio;
      // Stems shorter than the reference will plateau at their own duration —
      // don't try to push them past it.
      const cap = isFinite(a.duration) ? a.duration : Infinity;
      if (ref > cap) continue;
      if (Math.abs(a.currentTime - ref) > DRIFT_THRESHOLD) a.currentTime = ref;
    }
  }, 2000);
}
function stopDriftLoop() {
  if (driftTimer) { clearInterval(driftTimer); driftTimer = null; }
}

// ----- Keyboard -----
function onKeyDown(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') {
    if (!playBtn.disabled) { e.preventDefault(); togglePlay(); }
  } else if (e.key === 'l' || e.key === 'L') {
    if (loopStart != null) { e.preventDefault(); toggleLoopEnabled(); }
  } else if (e.key === 'Escape') {
    if (loopStart != null) { e.preventDefault(); clearLoop(); }
  } else if ((e.key === 'm' || e.key === 'M') && focusedIdx >= 0) {
    e.preventDefault();
    stems[focusedIdx].userMuted = !stems[focusedIdx].userMuted;
    applyMixState();
  } else if ((e.key === 's' || e.key === 'S') && focusedIdx >= 0) {
    e.preventDefault();
    stems[focusedIdx].soloed = !stems[focusedIdx].soloed;
    applyMixState();
  }
}

// ----- Download all stems as zip -----
async function downloadAllStems() {
  if (!stems.length || typeof JSZip !== 'function') return;
  const originalLabel = downloadBtn.textContent;
  downloadBtn.disabled = true;
  downloadBtn.textContent = '…';
  statusEl.textContent = `Zipping ${stems.length} stem${stems.length === 1 ? '' : 's'}…`;
  try {
    const zip = new JSZip();
    for (const s of stems) {
      const res = await fetch(s.audio.src);
      if (!res.ok) throw new Error(`${s.name}: HTTP ${res.status}`);
      const blob = await res.blob();
      zip.file(s.name, blob);
    }
    const out = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(out);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${activePracticeId || 'paperstem'}-stems.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 60_000);
    statusEl.textContent = `Downloaded ${stems.length} stems.`;
  } catch (err) {
    statusEl.textContent = `Download failed: ${err.message}`;
  } finally {
    downloadBtn.textContent = originalLabel;
    downloadBtn.disabled = false;
  }
}
</script>
</body>
</html>
