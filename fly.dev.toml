app = "paperstem-dev"
primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATABASE_PATH = "/data/paperstem.sqlite"
  APP_URL = "https://paperstem-dev.fly.dev"
  APP_ENV = "dev"

[[mounts]]
  source = "paperstem_dev_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
